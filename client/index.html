<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./src/assets/pizza.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <title>client</title>
  </head>
  <body>
    <div id="loader-wrapper">
      <img
        src="./src/assets/preloader.gif"
        alt="Loading..."
        id="loader-image"
      />
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      window.addEventListener("load", function () {
        const loader = document.getElementById("loader-wrapper");

        loader.style.opacity = "0";

        setTimeout(function () {
          loader.style.display = "none";
        }, 3000);
      });
    </script>

    <style>
      /* Loader Wrapper */
      #loader-wrapper {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100vh;
        background-color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
        padding: 1rem;
      }

      /* Loader Image */
      #loader-image {
        width: 120px;
        max-width: 40vw;
        height: auto;
        object-fit: contain;
      }

      /* Small Devices */
      @media (max-width: 640px) {
        #loader-image {
          width: 90px;
          max-width: 50vw;
        }
      }

      /* Tablets */
      @media (min-width: 641px) and (max-width: 1024px) {
        #loader-image {
          width: 110px;
        }
      }

      /* Large Screens */
      @media (min-width: 1025px) {
        #loader-image {
          width: 140px;
        }
      }
    </style>
  </body>
</html>
